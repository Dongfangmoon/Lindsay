			.box1{width: 80%;height: 530px;border: solid 1px lightblue;margin-left: 10%;}
			div.box1 ul{margin: 70px auto 0;width: 960px;}
			div.box1 ul li{width: 266px;height: 250px;border: 1px solid #ccc;background:url(img/aoyun1.jpg);background-size: 266px 250px;float: left;margin-right: 8%;margin-bottom:40px;position: relative;overflow: hidden;}
			div.box1 ul li:nth-child(2){background-image: url(img/素材-624913232.jpg);}
			div.box1 ul li:nth-child(3){margin-right: 0;background-image: url(img/素材-2118528176.jpg);}
			div.box1 ul li hgroup{position: absolute;left: 0;top: -250px;width: 266px;height: 250px;background: rgba(0,0,0,0.5);transition: all 0.5s ease-in 0s;}
			div.box1 ul li:hover hgroup{position: absolute;left: 0;top: 0;}
			div.box1 ul li hgroup h2:nth-child(1){font-size: 22px;text-align: center;color: #fff;font-weight: normal;margin-top: 58px;}
			div.box1 ul li hgroup h2:nth-child(2){font-size:14px;text-align: center;	color: #fff;font-weight: normal;margin-top: 58px;}
			
			.box2{width: 80%;height: 530px;border: solid 1px lightblue;margin-left: 10%;}
			.box2 ul{margin:70px auto 0;width: 960px;}
			.box2 ul li{width:291px;height:251px;float: left;margin-right:4%;margin-bottom: 40px;position: relative;background-size: 266px 250px;perspective: 5000px;transform-style: preserve-3d;transition: all 1s ease 0s;	}
			.box2 ul li:hover{transform: rotateX(-90deg);-ms-transform: rotate(-90deg);-webkit-transform: rotateX(-90deg);-moz-transform: rotateX(-90deg);-o-transform: rotateX(-90deg);}
			.box2 ul li img{width: 266px;height: 250px;position: absolute;left:0;top:0;	}
			.box2 ul li img.fan{transform: translateZ(100px);-ms-transform: rotateZ(100px);-webkit-transform: rotateZ(100px);-moz-transform: rotateZ(100px);-o-transform:rotateZ(100px);z-index: 2;}
			.box2 ul li:hover img.zheng{transform: rotateX(90deg) translateZ(100px);-ms-transform: rotateX(90deg) translateZ(100px);-webkit-transform: rotateX(90deg) translateZ(100px);-o-transform:rotateX(90deg)translateZ(100px);} 			
			
			.box3{width: 80%;height: 530px;border: solid 1px lightblue;margin-left: 10%;}
			.box3 ul{margin:70px auto 0;width: 960px;}
			.box3 ul li{width:190px;height:190px;border-radius: 50%;float: left;margin-right:5%;margin-bottom: 40px;position: relative;}
			.box3 ul li img{width:190px;height:190px;position: absolute;top:30%;left:50%;transform:translate(-50%,-50%);border-radius: 50%;}
			.box3 ul li:nth-child(4),.text ul li:nth-child(8){margin-right:0;}
			.box3 ul li .tihuan{opacity: 0;transition:all 0.4s ease-in 0.2s;	}
			.box3 ul li:hover .tihuan{opacity: 1;transform:translate(-50%,-50%) scale(0.75);	}
			.box3 ul li .tu{transition:all 0.4s ease-in 0s;}
			.box3 ul li:hover .tu{opacity: 0;transform:translate(-50%,-50%) scale(0.5);}
			
			footer{width: 100%;height: 400px;background:lightblue;border-bottom: 1px solid #fff;}
			.logo{width:50px;margin-left:1000px;width:1000px;height:100px;margin:0 auto;background: url(img/0b55b319ebc4b74543a911dd9eb109178a82b801bfe1.png) no-repeat center center;background-size: 40px;border-bottom: 1px solid #fff;}
			.message{width: 1000px;margin: 20px auto 0;color:#fffada;}

			footer li{float: left;margin-right: 30px;}
			footer li input{width: 215px;height: 32px;border-radius: 5px;margin: 10px 0 15px 0;padding-left: 10px;box-sizing: border-box;border: none;}

			.right{float: left;}

			footer textarea{width: 400px;height: 172px;padding: 10px;box-sizing: border-box;resize: none;}
			
			.banquan{width: 100%;height: 60px;background: #333333;text-align: center;}
		</style>
